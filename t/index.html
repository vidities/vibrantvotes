<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in | TikTok</title>
    <style>
      :root {
        --bg: #ffffff;
        --surface: #ffffff;
        --text: #161823;
        --text-muted: #8a8b91;
        --border: #e3e4e8;
        --border-focus: #161823;
        --primary: #fe2c55;
        --primary-hover: #e5274c;
        --primary-soft: rgba(254, 44, 85, 0.08);
        --error: #fe2c55;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        --radius: 8px;
        --radius-lg: 12px;
        --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
        line-height: 1.5;
      }
      .page {
        width: 100%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .login-card {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        padding: 40px 32px 32px;
        animation: cardIn 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      }
      @keyframes cardIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .logo-block { text-align: center; margin-bottom: 28px; }
      .tiktok-logo { width: 44px; height: 50px; margin-bottom: 12px; }
      .logo-block h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.2px; }
      .login-form { display: flex; flex-direction: column; gap: 16px; }
      .field { position: relative; }
      .field input {
        width: 100%;
        height: 52px;
        padding: 18px 14px 6px;
        font-size: 16px;
        font-family: var(--font);
        color: var(--text);
        background: #fafafa;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        outline: none;
        transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      }
      .field input:focus {
        border-color: var(--border-focus);
        background: #fff;
        box-shadow: 0 0 0 3px rgba(22, 24, 35, 0.06);
      }
      .field label {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 16px;
        color: var(--text-muted);
        pointer-events: none;
        transition: all 0.18s ease;
      }
      .field input:focus + label,
      .field input:not(:placeholder-shown) + label {
        top: 12px;
        transform: translateY(0);
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
      }
      .toggle-eye {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        padding: 6px;
        cursor: pointer;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        transition: color 0.2s, background 0.2s;
      }
      .toggle-eye:hover { color: var(--text); background: rgba(0, 0, 0, 0.05); }
      .toggle-eye.active { color: var(--primary); }
      .row-between {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 14px;
      }
      .check {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        color: var(--text);
        user-select: none;
      }
      .check input { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
      .link-muted { color: var(--text-muted); text-decoration: none; font-weight: 600; transition: color 0.2s; }
      .link-muted:hover { color: var(--text); }
      .btn-primary {
        width: 100%;
        height: 48px;
        border: none;
        border-radius: var(--radius);
        background: var(--primary);
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        font-family: var(--font);
        cursor: pointer;
        transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
        margin-top: 4px;
      }
      .btn-primary:hover:not(:disabled) {
        background: var(--primary-hover);
        box-shadow: 0 4px 14px rgba(254, 44, 85, 0.3);
      }
      .btn-primary:active:not(:disabled) { transform: scale(0.98); }
      .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
      .error {
        font-size: 13px;
        color: var(--error);
        text-align: center;
        padding: 8px 12px;
        background: var(--primary-soft);
        border-radius: var(--radius);
        animation: shake 0.35s;
      }
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-4px); }
        75% { transform: translateX(4px); }
      }
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 24px 0;
        color: var(--text-muted);
        font-size: 13px;
        font-weight: 600;
      }
      .divider::before, .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .social-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        height: 44px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #fff;
        font-size: 14px;
        font-weight: 600;
        font-family: var(--font);
        color: var(--text);
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s, transform 0.1s;
      }
      .social-btn:hover { border-color: var(--border-focus); background: #fafafa; }
      .social-btn:active { transform: scale(0.97); }
      .signup-text { text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-muted); }
      .link-accent { color: var(--primary); text-decoration: none; font-weight: 700; margin-left: 4px; }
      .link-accent:hover { text-decoration: underline; }
      .footer {
        width: 100%;
        max-width: 400px;
        margin-top: 32px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      .lang select {
        height: 36px;
        padding: 0 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #fff;
        font-size: 14px;
        font-family: var(--font);
        color: var(--text);
        cursor: pointer;
        outline: none;
      }
      .footer-links { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
      .footer-links a {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 13px;
        font-weight: 600;
        transition: color 0.2s;
      }
      .footer-links a:hover { color: var(--text); }
      .copyright { font-size: 12px; color: var(--text-muted); }
      @media (max-width: 420px) {
        .login-card { padding: 32px 20px 24px; }
        .social-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="login-card">
        <div class="logo-block">
          <svg class="tiktok-logo" viewBox="0 0 264 296" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M194.5 0c8.1 22.5 22.8 42.3 43.5 54.5 13 7.7 26.8 12.4 41 14v62c-25-1-48.5-8.6-69.5-22v100c0 48-34.5 87.5-82 87.5-40 0-73-28-81-65.5-1-5-1.5-10-1.5-15.5 0-46 37.5-83.5 83.5-83.5 4.5 0 9 .4 13.5 1v63c-4.5-1.5-9-2-13.5-2-20 0-36 16-36 36s16 36 36 36 36-16 36-36V0h59z" fill="#25F4EE"/>
            <path d="M185.5 0c8.1 22.5 22.8 42.3 43.5 54.5 13 7.7 26.8 12.4 41 14v62c-25-1-48.5-8.6-69.5-22v100c0 48-34.5 87.5-82 87.5-40 0-73-28-81-65.5 8.5 4 18 6.5 28 6.5 20 0 36-16 36-36V0h84z" fill="#FE2C55"/>
            <path d="M176.5 0c8.1 22.5 22.8 42.3 43.5 54.5 13 7.7 26.8 12.4 41 14v62c-25-1-48.5-8.6-69.5-22v100c0 48-34.5 87.5-82 87.5-40 0-73-28-81-65.5-1-5-1.5-10-1.5-15.5 0-46 37.5-83.5 83.5-83.5 4.5 0 9 .4 13.5 1v63c-4.5-1.5-9-2-13.5-2-20 0-36 16-36 36s16 36 36 36 36-16 36-36V0h74z" fill="#fff"/>
          </svg>
          <h1>Log in to TikTok</h1>
        </div>
        <form class="login-form" id="loginForm" novalidate>
          <div class="field">
            <input type="text" id="usernameInput" autocomplete="username" placeholder=" " required />
            <label for="usernameInput">Email or username</label>
          </div>
          <div class="field">
            <input type="password" id="passwordInput" autocomplete="current-password" placeholder=" " required />
            <label for="passwordInput">Password</label>
            <button type="button" class="toggle-eye" id="showPasswordBtn" aria-label="Show password" style="display:none">Show</button>
          </div>
          <div class="row-between">
            <label class="check">
              <input type="checkbox" id="remember" />
              <span>Remember me</span>
            </label>
            <a href="#" class="link-muted">Forgot password?</a>
          </div>
          <button type="button" class="btn-primary" id="loginBtn" disabled>Log in</button>
          <p class="error" id="error" hidden></p>
        </form>
        <div class="divider"><span>or</span></div>
        <div class="social-grid">
          <a href="https://accounts.google.com/signin" class="social-btn" data-provider="Google" aria-label="Continue with Google">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.5 12.2c0-.7-.1-1.4-.2-2H12v3.9h5.9a5 5 0 0 1-2.2 3.3v2.7h3.6c2.1-2 3.2-4.9 3.2-7.9z"/><path fill="#34A853" d="M12 23c2.9 0 5.4-1 7.2-2.6l-3.6-2.7c-1 .7-2.3 1.1-3.6 1.1-2.8 0-5.1-1.9-6-4.4H2.3v2.8A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M6 14.4a6.6 6.6 0 0 1 0-4.2V7.4H2.3a11 11 0 0 0 0 9.8L6 14.4z"/><path fill="#EA4335" d="M12 5.4c1.6 0 3 .5 4.1 1.6l3.1-3.1A11 11 0 0 0 2.3 7.4L6 10.2c.9-2.6 3.2-4.8 6-4.8z"/></svg>
            <span>Google</span>
          </a>
          <a href="https://appleid.apple.com/sign-in" class="social-btn" data-provider="Apple" aria-label="Continue with Apple">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="#000"><path d="M16.4 12.6c0-2 1.6-3 1.7-3.1-1-1.4-2.4-1.6-2.9-1.6-1.2-.1-2.4.7-3 .7-.6 0-1.6-.7-2.6-.7-1.3 0-2.6.8-3.3 2-1.4 2.4-.4 6 1 8 .7 1 1.4 2 2.5 2 1 0 1.4-.6 2.6-.6s1.5.6 2.6.6 1.8-1 2.5-2c.8-1.1 1.1-2.2 1.1-2.3 0 0-2.1-.8-2.1-3.1zM14.4 6.4c.5-.7.9-1.6.8-2.5-.8 0-1.7.5-2.3 1.2-.5.6-.9 1.5-.8 2.4.9.1 1.7-.4 2.3-1.1z"/></svg>
            <span>Apple</span>
          </a>
          <a href="https://www.facebook.com/login" class="social-btn" data-provider="Facebook" aria-label="Continue with Facebook">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="#1877F2"><path d="M24 12a12 12 0 1 0-13.9 11.9v-8.4H7v-3.5h3.1V9.4c0-3 1.8-4.7 4.6-4.7 1.3 0 2.7.2 2.7.2v3h-1.5c-1.5 0-2 .9-2 1.9v2.2h3.4l-.5 3.5h-2.9v8.4A12 12 0 0 0 24 12z"/></svg>
            <span>Facebook</span>
          </a>
          <a href="https://twitter.com/i/flow/login" class="social-btn" data-provider="X" aria-label="Continue with X">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="#000"><path d="M18.2 2h3.3l-7.2 8.3L23 22h-6.6l-5.2-6.8L5.4 22H2l7.7-8.8L1.5 2h6.8l4.7 6.2L18.2 2zm-1.2 18h1.8L7.1 3.9H5.2L17 20z"/></svg>
            <span>X</span>
          </button>
        </div>
        <p class="signup-text">
          Don't have an account?
          <a href="#" class="link-accent">Sign up</a>
        </p>
      </div>
      <footer class="footer">
        <div class="lang">
          <select aria-label="Language">
            <option>English</option>
            <option>Español</option>
            <option>Français</option>
            <option>Deutsch</option>
            <option>日本語</option>
            <option>中文</option>
          </select>
        </div>
        <div class="footer-links">
          <a href="#">Help</a>
          <a href="#">Privacy</a>
          <a href="#">Terms</a>
          <a href="#">Contact</a>
        </div>
        <span class="copyright">© 2025 TikTok Clone</span>
      </footer>
    </div>
    <script src="script.js" defer></script>
  </body>
</html>
