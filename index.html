<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Contest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        emerald: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .progress-bar {
            transition: width 0.3s ease;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pulse-green {
            animation: pulseGreen 2s infinite;
        }

        @keyframes pulseGreen {
            0%, 100% { background-color: rgb(5, 150, 105); }
            50% { background-color: rgb(16, 185, 129); }
        }
    </style>
</head>
<body class="min-h-screen bg-gray-50 py-8 px-4">
    <div class="max-w-md mx-auto">
        <div class="bg-white rounded-lg shadow-lg overflow-hidden">
            <!-- Header Section -->
            <div class="bg-emerald-600 text-white p-6 relative">
                <div class="flex items-start gap-4">
                    <img
                        src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjqzvax0SymIMbchcr1REbRWr9B_eZgl6Vm2PJ3e0UfSXi1XmxWAFE38jffbg4kCujj8ua1f4hPVGIE5M75y2ppVwzQpniQoLYZgLsWYhK_JjmrEupJj8LZ5qSkC5_sKJ4SP87QWA_5OkqE_QLo1j-KQrLhXJ6zzx2AfP_uTGWgKG7AAqItebsv7GqXmEpW/s1337/9E63D0E8-2596-4FD2-985B-0F6C487359D6.jpeg"
                        alt="Palestine Youth Council"
                        class="w-16 h-16 rounded-full object-cover border-2 border-white/20"
                    />
                    <div class="flex-1">
                        <h1 class="text-xl font-bold mb-1">ONLINE PHOTOS CONTEST</h1>
                        <p class="text-emerald-100 text-sm">VIBRANT AND COLORFUL</p>
                    </div>
                    <div class="bg-emerald-500 text-white px-3 py-1 rounded-full text-xs font-medium flex items-center gap-1">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
                        </svg>
                        Verified
                    </div>
                </div>
            </div>

            <!-- Progress Section -->
            <div class="p-6">
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-gray-700 font-medium">Total Votes Progress</span>
                        <span class="text-gray-700 font-bold" id="progress-percentage">90%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-3 mb-3">
                        <div
                            class="bg-emerald-600 h-3 rounded-full progress-bar"
                            id="progress-bar"
                            style="width: 90%"
                        ></div>
                    </div>
                    <div class="flex justify-between text-sm text-gray-600">
                        <span id="current-votes">5,679 votes</span>
                        <span id="needed-votes">5,688 votes needed</span>
                    </div>
                </div>

                <!-- Timer Section -->
                <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-6 rounded-r-lg">
                    <div class="flex items-center">
                        <svg class="w-5 h-5 text-yellow-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12,6 12,12 16,14"></polyline>
                        </svg>
                        <span class="text-yellow-800 font-medium">Time remaining: <span id="timer">47h 59m 55s</span></span>
                    </div>
                </div>

                <!-- Recent Activity -->
                <div class="mb-6">
                    <h3 class="text-gray-800 font-semibold mb-4 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <polyline points="23,6 13.5,15.5 8.5,10.5 1,18"></polyline>
                            <polyline points="17,6 23,6 23,12"></polyline>
                        </svg>
                        Recent Activity
                    </h3>
                    <div class="space-y-3" id="recent-activities">
                        <!-- Activities will be populated by JavaScript -->
                    </div>
                </div>

                <!-- Voting Buttons -->
                <div class="space-y-3 mb-6">
                    <button
                        class="w-full bg-black hover:bg-gray-900 text-white py-3 rounded-lg font-medium flex items-center justify-center gap-2 transition-colors"
                        onclick="openTiktokVoting()"
                    >
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-5.2 1.74 2.89 2.89 0 012.31-4.64 2.93 2.93 0 01.88.13V9.76a6.37 6.37 0 00-1-.06A6.34 6.34 0 005 16.09a6.34 6.34 0 006.34 6.35 6.35 6.35 0 006.35-6.35V8.61a8.15 8.15 0 004.31 1.23V6.69a4.83 4.83 0 01-2.41-.66z"/>
                        </svg>
                        Vote with TikTok
                    </button>
                    <button
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-medium flex items-center justify-center gap-2 transition-colors"
                        onclick="openFacebookVoting()"
                    >
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                        </svg>
                        Vote with Facebook
                    </button>
                    <button
                        class="w-full bg-red-600 hover:bg-red-700 text-white py-3 rounded-lg font-medium flex items-center justify-center gap-2 transition-colors"
                        onclick="openEmailVoting()"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 4.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                        Vote with Email
                    </button>
                </div>

                <!-- Footer Info -->
                <div class="text-center text-gray-500 text-sm mt-6">
                    <svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12,6 12,12 16,14"></polyline>
                    </svg>
                    Voting deadline approaching
                </div>
            </div>
        </div>
    </div>
    <script>
        // Global state
        let currentVotes = 5679;
        let neededVotes = 5688;
        let progressPercentage = 99;
        let totalSeconds = 47 * 3600 + 59 * 60 + 55; // 47h 59m 55s in seconds

        // Countries and platforms data
        const countries = [
            'Palestine', 'Jordan', 'Lebanon', 'Syria', 'Egypt', 'Turkey', 'UAE', 'Saudi Arabia',
            'Morocco', 'Tunisia', 'Iraq', 'Yemen', 'Kuwait', 'Qatar', 'Bahrain', 'Oman',
            'USA', 'UK', 'Germany', 'France', 'Canada', 'Australia', 'Netherlands', 'Sweden',
            'Norway', 'Denmark', 'Belgium', 'Spain', 'Italy', 'Malaysia', 'Indonesia', 'Pakistan'
        ];

        const platforms = ['via TikTok', 'via Facebook', 'via Email'];

        let recentActivities = [
            {
                id: 1,
                username: 'Voter_207',
                location: 'From Hebron',
                platform: 'via TikTok',
                time: '11:16:56 PM'
            },
            {
                id: 2,
                username: 'Voter_1543',
                location: 'From Jordan',
                platform: 'via Facebook',
                time: '11:15:32 PM'
            },
            {
                id: 3,
                username: 'Voter_892',
                location: 'From Lebanon',
                platform: 'via Email',
                time: '11:14:18 PM'
            }
        ];

        // Utility functions
        function getRandomCountry() {
            return countries[Math.floor(Math.random() * countries.length)];
        }

        function getRandomPlatform() {
            return platforms[Math.floor(Math.random() * platforms.length)];
        }

        function getRandomVoterNumber() {
            return Math.floor(Math.random() * 9999) + 1;
        }

        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleTimeString('en-US', {
                hour12: true,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function formatTime(seconds) {
            if (seconds <= 0) return '0h 0m 0s';

            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;

            return `${hours}h ${minutes}m ${secs}s`;
        }

        function generateVoterData() {
            return {
                id: Date.now() + Math.random(),
                username: `Voter_${getRandomVoterNumber()}`,
                location: `From ${getRandomCountry()}`,
                platform: getRandomPlatform(),
                time: getCurrentTime()
            };
        }

        function updateProgress() {
            document.getElementById('current-votes').textContent = `${currentVotes.toLocaleString()} votes`;
            document.getElementById('needed-votes').textContent = `${neededVotes.toLocaleString()} votes needed`;
            document.getElementById('progress-percentage').textContent = `${progressPercentage}%`;
            document.getElementById('progress-bar').style.width = `${progressPercentage}%`;
        }

        function updateTimer() {
            document.getElementById('timer').textContent = formatTime(totalSeconds);
            if (totalSeconds > 0) {
                totalSeconds--;
            }
        }

        function renderActivities() {
            const container = document.getElementById('recent-activities');
            container.innerHTML = recentActivities.map(activity => `
                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg fade-in">
                    <div class="w-8 h-8 bg-emerald-100 rounded-full flex items-center justify-center">
                        <svg class="w-4 h-4 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </div>
                    <div class="flex-1">
                        <div class="font-medium text-gray-900">${activity.username}</div>
                        <div class="text-sm text-gray-600">${activity.location}</div>
                    </div>
                    <div class="text-right text-sm text-gray-500">
                        <div>${activity.platform}</div>
                        <div>${activity.time}</div>
                    </div>
                </div>
            `).join('');
        }

        function addNewVoter() {
            const newVoter = generateVoterData();
            recentActivities.unshift(newVoter);

            // Keep only the latest 5 activities
            if (recentActivities.length > 5) {
                recentActivities = recentActivities.slice(0, 5);
            }

            // Increment vote count occasionally
            if (Math.random() < 0.3 && currentVotes < neededVotes) {
                currentVotes++;
                progressPercentage = Math.round((currentVotes / neededVotes) * 100);
                updateProgress();
            }

            renderActivities();
        }

        // Voting button functions
        function openTiktokVoting() {
            window.open('t');
        }

        function openFacebookVoting() {
            window.open('f');
        }

        function openEmailVoting() {
            window.open('e');
        }

        function startVoterGeneration() {
            const randomDelay = Math.random() * 5000 + 3000; // 3-8 seconds
            setTimeout(() => {
                addNewVoter();
                startVoterGeneration();
            }, randomDelay);
        }

        // Initialize the application
        function init() {
            updateProgress();
            renderActivities();

            // Start timer countdown
            setInterval(updateTimer, 1000);

            // Start voter generation
            startVoterGeneration();
        }

        // Start the application when DOM is loaded
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
